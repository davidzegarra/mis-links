<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDZO Cyber Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#05070a;
color:#00ff99;
display:flex;
min-height:100vh;
}

.sidebar{
width:240px;
background:#0b1116;
padding:20px;
border-right:1px solid #00ff8850;
}

.sidebar h2{
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

.sidebar a{
display:block;
padding:10px;
margin:6px 0;
color:#aaa;
text-decoration:none;
border-radius:8px;
transition:0.3s;
}

.sidebar a:hover{
background:#00ff8820;
color:#00ff99;
}

.main{
flex:1;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.glow{
text-shadow:0 0 10px #00ff99;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#0c141a;
padding:15px;
border-radius:12px;
border:1px solid #00ff8840;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
border-color:#00ff99;
}

.news{
margin-top:30px;
background:#0b1116;
padding:15px;
border-radius:12px;
border:1px solid #00ff8850;
}

.video{
margin:10px 0;
padding:10px;
background:#111a20;
border-left:3px solid #00ff99;
border-radius:8px;
}

button{
background:#00ff99;
border:none;
padding:10px;
color:#000;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>SDZO SYSTEM</h2>
<a href="#">🏠 Inicio</a>
<a href="#">🔗 Links</a>
<a href="#">🧠 Contenido</a>
<a href="#">🛡 Seguridad</a>
<a href="#">📡 Noticias</a>
</div>

<div class="main">

<div class="header">
<h1 class="glow">DASHBOARD CYBER 2026</h1>
<button onclick="loadNews()">Actualizar noticias</button>
</div>

<p>Noticias reales de ciberseguridad en tiempo real.</p>

<div class="grid">
<div class="card">💬 WhatsApp</div>
<div class="card">📸 Instagram</div>
<div class="card">🎵 TikTok</div>
<div class="card">▶ YouTube</div>
<div class="card">🛒 Tienda</div>
<div class="card">📩 Email</div>
</div>

<div class="news">
<h3>🧠 Noticias de Ciberseguridad (LIVE)</h3>
<div id="newsBox">Cargando noticias...</div>
</div>

</div>

<script>
// 🔥 API REAL DE NOTICIAS
async function loadNews(){
const url = "https://api.rss2json.com/v1/api.json?rss_url=https://www.bleepingcomputer.com/feed/";

const res = await fetch(url);
const data = await res.json();

let html = "";

data.items.slice(0,5).forEach(item=>{
html += `
<div class="video">
🔥 ${item.title}<br>
<a href="${item.link}" target="_blank">Leer más</a>
</div>
`;
});

document.getElementById("newsBox").innerHTML = html;
}

// cargar al inicio
loadNews();
</script>

</body>
</html>

</body>
</html>
