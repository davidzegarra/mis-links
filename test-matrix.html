<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST MATRIX LAB</title>

<style>
/* ================================
🌐 ESTILO BASE
================================ */
body{
  margin:0;
  background:black;
  overflow:hidden;
}

/* ================================
🖥️ CANVAS MATRIX
================================ */
canvas{
  display:block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🧪 MATRIX LAB FINAL ESTABLE
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 🔢 caracteres binarios
const chars = "01";

// 📏 tamaño de letra
const fontSize = 18;

// 📊 variables dinámicas
let columns;
let drops = [];

// 🧭 mouse tracking (efecto simple)
let mouseX = 0;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
});

// ================================
// 🔧 INICIALIZAR MATRIX
// ================================
function initMatrix(){

  // 📐 ajustar tamaño real del canvas
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  // 📊 calcular columnas según ancho real
  columns = Math.floor(canvas.width / fontSize);

  // 🌧️ generar gotas en posiciones aleatorias (evita línea horizontal)
  drops = new Array(columns).fill(0).map(() =>
    Math.random() * (canvas.height / fontSize)
  );
}

// ================================
// 🎨 DIBUJAR MATRIX
// ================================
function draw(){

  // 🧼 limpiar pantalla (con leve rastro)
  ctx.fillStyle = "rgba(0,0,0,1)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < columns; i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 🎯 efecto simple mouse
    ctx.fillStyle = (Math.abs(mouseX - x) < 100)
      ? "#ffffff"
      : "#00ff99";

    ctx.fillText(text, x, y);

    // 🔁 reinicio cuando llega abajo
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ================================
// 🚀 ARRANQUE SEGURO
// ================================
initMatrix();
window.addEventListener("resize", initMatrix);

// ⚡ loop de animación
setInterval(draw, 33);

</script>

</body>
</html>
