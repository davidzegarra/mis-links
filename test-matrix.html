<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX FINAL ESTABLE</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 🔥 FIJO (evita errores de resize)
let w = window.innerWidth;
let h = window.innerHeight;

canvas.width = w;
canvas.height = h;

// 🔢 caracteres
const chars = "01";
const fontSize = 18;

// 🧠 columnas fijas
const columns = Math.floor(w / fontSize);

// 🌧️ gotas seguras
const drops = new Array(columns);

// inicializar
for(let i = 0; i < columns; i++){
  drops[i] = Math.random() * h;
}

// 🧭 mouse simple
let mouseX = 0;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
});

// 🔥 render estable
function draw(){

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,w,h);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < columns; i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i];

    // 🎨 blanco cerca del mouse
    ctx.fillStyle = (Math.abs(mouseX - x) < 100) ? "#ffffff" : "#00ff99";

    ctx.fillText(text, x, y);

    // reinicio seguro
    if(y > h){
      drops[i] = 0;
    }

    drops[i] += 6;
  }
}

setInterval(draw, 33);

</script>

</body>
</html>
