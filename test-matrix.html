<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST MATRIX VISUAL LAB</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

/* canvas full screen independiente */
canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🧪 MATRIX VISUAL LAB (INDEPENDIENTE TOTAL)
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 🔧 configuración visual simple
const chars = "01";
const fontSize = 20;

// 🎯 estado interno del test
let particles = [];

// ===============================
// 📐 resize independiente
// ===============================
function setup(){

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  particles = [];

  // 🔥 generamos partículas aleatorias (NO columnas fijas)
  for(let i = 0; i < 200; i++){

    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      speed: 1 + Math.random() * 3,
      char: chars[Math.floor(Math.random()*chars.length)]
    });
  }
}

// ===============================
// 🎨 render visual libre
// ===============================
function draw(){

  // fondo limpio con leve persistencia
  ctx.fillStyle = "rgba(0,0,0,0.35)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  particles.forEach(p => {

    // cambio aleatorio de carácter
    if(Math.random() > 0.95){
      p.char = chars[Math.floor(Math.random()*chars.length)];
    }

    // color dinámico simple
    ctx.fillStyle = (Math.random() > 0.98)
      ? "#ffffff"
      : "#00ff99";

    ctx.fillText(p.char, p.x, p.y);

    // movimiento libre (NO columnas)
    p.y += p.speed;

    // reset cuando sale
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

// ===============================
// 🚀 inicio limpio
// ===============================
setup();
window.addEventListener("resize", setup);

// loop independiente
setInterval(draw, 33);

</script>

</body>
</html>
