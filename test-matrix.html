<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Matrix Simple Funcional</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🌧️ MATRIX SIMPLE 100% FUNCIONAL
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 📏 tamaño fijo pantalla
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔢 caracteres
const chars = "01";

// ⚙️ tamaño letra
const fontSize = 18;

// 🧠 columnas
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ gotas
const drops = [];

for(let i = 0; i < columns; i++){
  drops[i] = Math.random() * canvas.height;
}

// 🧭 mouse simple
let mouseX = 0;
document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
});

// 🔥 animación
function draw(){

  // limpiar pantalla
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < columns; i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i];

    // 🎨 blanco cerca del mouse, verde normal
    if(Math.abs(mouseX - x) < 80){
      ctx.fillStyle = "#ffffff";
    } else {
      ctx.fillStyle = "#00ff99";
    }

    ctx.fillText(text, x, y);

    // reinicio caída
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i] += 10;
  }
}

// 🔥 loop estable
setInterval(draw, 33);

</script>

</body>
</html>
