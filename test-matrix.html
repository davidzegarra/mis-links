<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST MATRIX ISOLATED</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

canvas{
  display:block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🌧️ MATRIX TEST INDEPENDIENTE
// (NO TOCA TU PROYECTO REAL)
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 📏 tamaño seguro
function setup(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
setup();

window.addEventListener("resize", setup);

// 🔢 binario
const chars = "01";
const fontSize = 16;

// 🧠 columnas correctas
let columns = Math.floor(canvas.width / fontSize);
let drops = Array(columns).fill(0);

// 🧭 mouse
let mouseX = 0;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
});

// 🔥 loop seguro
function draw(){

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<columns;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 🎨 MISMO ESTILO QUE TU PRINCIPAL (simple y seguro)
    ctx.fillStyle = (Math.abs(mouseX - x) < 90)
      ? "#ffffff"
      : "#00ff99";

    ctx.fillText(text, x, y);

    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// 🔥 render estable (igual que tu sistema base)
setInterval(draw, 33);

</script>

</body>
</html>
