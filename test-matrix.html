<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX SIMPLE</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#matrix{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 📏 tamaño pantalla
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔢 caracteres
const chars = "01";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ gotas
let drops = Array(columns).fill(1);

// 🧭 mouse
let mouseX = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
});

// 🔥 animación
function draw(){

  // 🌫️ limpio suave
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < columns; i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 🎨 SOLO CAMBIO SIMPLE (como querías)
    if(Math.abs(mouseX - x) < 80){
      ctx.fillStyle = "#ffffff"; // blanco al pasar mouse
    } else {
      ctx.fillStyle = "#00ff99"; // verde normal
    }

    ctx.fillText(text, x, y);

    // 🔁 reinicio caída
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ⚡ loop estable
setInterval(draw, 33);

</script>

</body>
</html>
