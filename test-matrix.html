<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 16;

// 🧠 columnas FIJAS (CLAVE DEL ARREGLO)
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ cada columna tiene su caída
let drops = new Array(columns).fill(0);

// 🧭 mouse
let mouseX = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
});

function draw(){

  // fondo limpio (sin manchas)
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < columns; i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    // 🚨 X FIJO POR COLUMNA (ESTO TE ARREGLA TODO)
    const x = i * fontSize;

    // Y cae por columna
    const y = drops[i] * fontSize;

    // color estable + blanco cerca mouse
    let color = (Math.abs(mouseX - x) < 80) ? "#ffffff" : "#00ff99";

    ctx.fillStyle = color;
    ctx.fillText(text, x, y);

    // reinicio caída
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i] += 1;
  }
}

setInterval(draw, 33);

</script>
