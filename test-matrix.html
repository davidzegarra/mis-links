<script>
// 🌧️ MATRIX INTERACTIVO PRO (RESPONDE AL MOUSE)

// 📌 CANVAS
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 🎯 Ajuste HD (evita pixelado)
function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resize();
window.addEventListener("resize", resize);

// 🧠 caracteres binarios
const chars = "01";

// ⚙️ configuración visual
const fontSize = 16;
let columns = Math.floor(window.innerWidth / fontSize);

// 🌧️ gotas
let drops = Array(columns).fill(1);

// 🧭 posición del mouse
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

// 🎯 detectar mouse
document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔥 función principal
function draw(){

  // 🌫️ fondo con rastro (efecto matrix)
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = chars[Math.floor(Math.random() * chars.length)];

    // 📍 posición base
    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 🧠 distancia al mouse (efecto interacción)
    const dx = mouseX - x;
    const dy = mouseY - y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // 🔥 efecto de proximidad (brillo dinámico)
    let alpha = 0.2;
    let color = "#00ff99";

    if(dist < 120){
      alpha = 1;
      color = "#66ffcc";
    } else if(dist < 250){
      alpha = 0.5;
    }

    ctx.fillStyle = `rgba(0,255,153,${alpha})`;
    ctx.fillText(text, x, y);

    // 🔁 reinicio de gotas
    if(y > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ⚡ velocidad de animación
setInterval(draw, 33);
</script>
