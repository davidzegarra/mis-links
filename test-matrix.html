<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX CLEAN FIX</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🌧️ MATRIX LIMPIO (SIN MANCHAS)
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ gotas
let drops = Array(columns).fill(1);

// 🧭 mouse
let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔥 DRAW LIMPIO
function draw(){

  // ❗ LIMPIEZA TOTAL (NO TRAIL → SIN MANCHAS)
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    const dx = mouseX - x;
    const dy = mouseY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // 🎨 COLOR ESTABLE (SIN PARPADEO GLOBAL)
    let color = "#00ff99"; // verde fijo base

    if(dist < 80){
      color = "#ffffff"; // blanco SOLO cerca
    }

    ctx.fillStyle = color;
    ctx.fillText(text, x, y);

    // 🔁 caída normal
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

</script>

</body>
</html>
