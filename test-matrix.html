<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX NUEVO INICIO</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

/* 🎥 canvas ocupa toda la pantalla */
canvas{
  display:block;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🌧️ MATRIX DESDE CERO (ESTABLE)
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 📏 ajuste de pantalla
function fit(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
fit();
window.addEventListener("resize", fit);

// 🔢 caracteres binarios
const chars = "01";

// ⚙️ tamaño de letra
const fontSize = 18;

// 🧠 columnas
let columns;
let drops;

// 🧭 inicializar sistema
function init(){
  columns = Math.floor(canvas.width / fontSize);
  drops = new Array(columns).fill(0);
}
init();

// mouse simple
let mouseX = 0;
document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
});

// 🔥 dibujo principal
function draw(){

  // fondo limpio (sin manchas raras)
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<columns;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 🎨 SOLO EFECTO SIMPLE (CLARO Y FUNCIONAL)
    ctx.fillStyle = (Math.abs(mouseX - x) < 100) ? "#ffffff" : "#00ff99";

    ctx.fillText(text, x, y);

    // reinicio caída
    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// 🚀 loop estable (SIN setInterval PROBLEMÁTICO)
function loop(){
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
