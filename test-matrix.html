<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX FIXED</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#matrix{
  position:fixed;
  top:0;
  left:0;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

const fontSize = 16;
const chars = "01";

let columns;
let drops = [];

// 🧠 FUNCIÓN CRÍTICA (FIX REAL)
function initMatrix(){

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  columns = Math.floor(canvas.width / fontSize);

  drops = Array(columns).fill(1);
}

// inicializar
initMatrix();

// si cambia tamaño pantalla
window.addEventListener("resize", initMatrix);

// mouse (opcional simple)
let mouseX = 0;
document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
});

function draw(){

  ctx.fillStyle = "black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<columns;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // blanco cerca del mouse
    let color = (Math.abs(mouseX - x) < 80) ? "#ffffff" : "#00ff99";

    ctx.fillStyle = color;
    ctx.fillText(text, x, y);

    if(y > canvas.height){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

</script>

</body>
</html>
