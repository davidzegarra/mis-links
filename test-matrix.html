<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TEST MATRIX CLEAN</title>

<style>
/* 🌐 fondo negro */
body{
  margin:0;
  overflow:hidden;
  background:black;
}

/* 🌧️ canvas full screen */
#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<!-- 🌧️ MATRIX CANVAS -->
<canvas id="matrix"></canvas>

<script>

// ===============================
// 🌧️ MATRIX LIMPIO (SIN EXPLOSIONES)
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 🎯 tamaño pantalla
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔢 binario
const chars = "01";

// ⚙️ configuración
const fontSize = 16;
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ gotas
let drops = Array(columns).fill(1);

// 🧭 mouse
let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;

// 🎯 detectar mouse
document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔥 ANIMACIÓN
function draw(){

  // 🌫️ rastro suave
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 📍 distancia al mouse
    const dx = mouseX - x;
    const dy = mouseY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // 🎨 COLOR SUAVE (SIN EXPLOSIONES)
    let color;

    if(dist < 80){
      color = "#ffffff"; // cerca del mouse
    }
    else if(dist < 150){
      color = "#00ff99"; // verde fuerte
    }
    else if(dist < 250){
      color = "#00aa66"; // verde medio
    }
    else{
      color = "#003b2a"; // oscuro
    }

    // 🔥 glow suave (sin exagerar)
    ctx.shadowBlur = dist < 150 ? 8 : 0;
    ctx.shadowColor = "#00ff99";

    ctx.fillStyle = color;
    ctx.fillText(text, x, y);

    // 🔁 reinicio lluvia
    if(y > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ⚡ velocidad estable
setInterval(draw, 33);

</script>

</body>
</html>
