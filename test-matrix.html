<script>

// 🌧️ MATRIX WOW (INTERACTIVO + NEÓN + ENERGÍA)

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// ⚡ alta resolución (HD real)
function resize(){
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
  
resize();
window.addEventListener("resize", resize);

// 🔢 binario
const chars = "01";

// ⚙️ configuración base
const fontSize = 16;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = Array(columns).fill(1);

// 🧭 mouse
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔥 animación
function draw(){

  // 🌫️ rastro (efecto energía)
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 📍 distancia mouse
    const dx = mouseX - x;
    const dy = mouseY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // ⚡ EFECTO WOW: COLOR DINÁMICO
    const hue = 120 + dist * 0.5;

    // 🔥 BRILLO NEÓN
    ctx.shadowBlur = dist < 150 ? 20 : 8;
    ctx.shadowColor = "#00ff99";

    // 🎨 COLOR CAMBIANTE
    ctx.fillStyle = `hsl(${hue}, 100%, ${dist < 150 ? 70 : 50}%)`;

    // ✏️ tamaño dinámico (efecto energía)
    const size = dist < 120 ? 22 : 14;
    ctx.font = size + "px monospace";

    ctx.fillText(text, x, y);

    // 🔁 reinicio
    if(y > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ⚡ velocidad
setInterval(draw, 33);

</script>
