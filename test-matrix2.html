<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MATRIX LEVEL UP</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

/* 🌧️ canvas full */
#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<script>

// ===============================
// 🔥 MATRIX LEVEL UP REAL
// ===============================

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔢 binario
const chars = "01";

// ⚙️ configuración base
const fontSize = 18;
const columns = Math.floor(canvas.width / fontSize);

// 🌧️ gotas
let drops = Array(columns).fill(1);

// 🧭 mouse
let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

// 🔥 ANIMACIÓN
function draw(){

  // 🌫️ rastro más fuerte (más visible)
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = chars[Math.floor(Math.random()*chars.length)];

    const x = i * fontSize;
    const y = drops[i] * fontSize;

    // 📍 distancia real
    const dx = mouseX - x;
    const dy = mouseY - y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // ⚡ EFECTO FUERTE (VISIBLE DE VERDAD)
    let color;
    let glow;

    if(dist < 100){
      color = "#ffffff";   // blanco fuerte
      glow = 25;
    }
    else if(dist < 200){
      color = "#00ff99";   // verde neón
      glow = 15;
    }
    else if(dist < 300){
      color = "#00aa66";   // verde medio
      glow = 8;
    }
    else{
      color = "#002b1c";   // fondo oscuro
      glow = 0;
    }

    // 🔥 glow real visible
    ctx.shadowBlur = glow;
    ctx.shadowColor = "#00ff99";

    ctx.fillStyle = color;
    ctx.fillText(text, x, y);

    // 🔁 reinicio
    if(y > canvas.height && Math.random() > 0.98){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

// ⚡ velocidad
setInterval(draw, 30);

</script>

</body>
</html>
